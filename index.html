<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>새생활의 시작 - 전단원 마스터</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f6; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--primary); }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { text-align: center; font-size: 1.5rem; margin-bottom: 30px; line-height: 1.4; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .grid button { padding: 20px; border: none; border-radius: 12px; background: var(--accent); color: white; font-size: 1rem; font-weight: bold; cursor: pointer; }
        .option { 
            display: block; width: 100%; padding: 18px; margin-bottom: 12px; border: 2px solid #eaeeef; 
            border-radius: 12px; text-align: left; background-color: #ffffff; color: #2c3e50 !important; 
            font-size: 1.05rem; font-weight: 500; cursor: pointer; transition: background 0.2s;
        }
        .option.correct { background-color: #d4edda !important; border-color: #c3e6cb !important; color: #155724 !important; }
        .option.wrong { background-color: #f8d7da !important; border-color: #f5c6cb !important; color: #721c24 !important; }
        .quiz-area, .result-area { display: none; }
        .question { font-size: 1.2rem; font-weight: bold; margin-bottom: 25px; line-height: 1.5; min-height: 4rem; word-break: keep-all; }
        .progress { font-size: 0.95rem; color: #7f8c8d; margin-bottom: 10px; font-weight: bold; }
        .back-btn { margin-top: 20px; background: #95a5a6; width: 100%; padding: 15px; color: white; border: none; border-radius: 12px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="home">
        <h1>📖 새생활의 시작<br><small style="font-weight: normal; font-size: 0.9rem;">전 단원(1~6과) 복습 퀴즈</small></h1>
        <div class="grid">
            <button onclick="startQuiz(1)">제1과</button>
            <button onclick="startQuiz(2)">제2과</button>
            <button onclick="startQuiz(3)">제3과</button>
            <button onclick="startQuiz(4)">제4과</button>
            <button onclick="startQuiz(5)">제5과</button>
            <button onclick="startQuiz(6)">제6과</button>
        </div>
    </div>

    <div id="quiz" class="quiz-area">
        <div class="progress" id="progress"></div>
        <div class="question" id="question"></div>
        <div id="options"></div>
    </div>

    <div id="result" class="result-area">
        <h2 id="score-text" style="text-align: center; white-space: pre-wrap;"></h2>
        <button class="back-btn" onclick="location.reload()">처음으로 돌아가기</button>
    </div>
</div>

<script>

let currentSection = 0;
let currentIdx = 0;
let score = 0;

function startQuiz(section) {
    currentSection = section;
    currentIdx = 0;
    score = 0;
    document.getElementById('home').style.display = 'none';
    document.getElementById('quiz').style.display = 'block';
    showQuestion();
}

function showQuestion() {
    const data = quizData[currentSection][currentIdx];
    document.getElementById('progress').innerText = `제 ${currentSection}과 복습 : 문제 ${currentIdx + 1} / 15`;
    document.getElementById('question').innerText = data.q;
    const optionsDiv = document.getElementById('options');
    optionsDiv.innerHTML = '';
    
    data.a.forEach((text, i) => {
        const btn = document.createElement('button');
        btn.className = 'option';
        btn.innerText = text;
        btn.onclick = () => checkAnswer(i);
        optionsDiv.appendChild(btn);
    });
}

function checkAnswer(selected) {
    const data = quizData[currentSection][currentIdx];
    const options = document.getElementsByClassName('option');
    
    if(selected === data.c) {
        options[selected].classList.add('correct');
        score++;
    } else {
        options[selected].classList.add('wrong');
        options[data.c].classList.add('correct');
    }

    for(let btn of options) btn.disabled = true;

    setTimeout(() => {
        currentIdx++;
        if(currentIdx < 15) showQuestion();
        else showResult();
    }, 1200);
}

function showResult() {
    document.getElementById('quiz').style.display = 'none';
    document.getElementById('result').style.display = 'block';
    document.getElementById('score-text').innerText = `제 ${currentSection}과 학습을 마쳤습니다!\n\n최종 점수: ${score} / 15`;
}
</script>
